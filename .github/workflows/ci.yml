name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust-img-vhd
    steps:
      - name: checkout am-img-vhd
        uses: actions/checkout@v4
        with:
          path: rust-img-vhd
      - name: checkout am-fs-core (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: antimatter-studios/rust-fs-core
          path: rust-fs-core
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-img-vhd
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test --all-targets
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt
      - name: fmt --check
        run: cargo fmt --check
