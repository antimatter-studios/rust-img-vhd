name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust-img-vhd
    steps:
      - name: checkout am-img-vhd
        uses: actions/checkout@v4
        with:
          path: rust-img-vhd
      - name: checkout am-fs-core (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: antimatter-studios/rust-fs-core
          ref: v0.2.2
          path: rust-fs-core
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-img-vhd
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test --all-targets
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  # Cross-validates our reader/writer against `qemu-img`. qemu-img is
  # invoked as a subprocess only — never linked, never bundled. The
  # qemu-utils package is installed only on the CI runner.
  qemu-validation:
    name: qemu-validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-img-vhd
    steps:
      - name: checkout am-img-vhd
        uses: actions/checkout@v4
        with:
          path: rust-img-vhd
      - name: checkout am-fs-core (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: antimatter-studios/rust-fs-core
          ref: v0.2.2
          path: rust-fs-core
      - name: install qemu-utils
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-utils
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-img-vhd
      - name: qemu cross-validation tests
        run: cargo test --features qemu-validation --test qemu_validation

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt
      - name: fmt --check
        run: cargo fmt --check
